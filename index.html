<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=960">
<title>Vita File Server</title>
<style>
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 20px;
}
h1 {
    color: #00d4ff;
    text-align: center;
    font-size: 28px;
    margin-bottom: 30px;
}
.file-list {
    max-width: 700px;
    margin: 0 auto;
}
.file-item {
    background: #16213e;
    border: 1px solid #0f3460;
    padding: 15px 20px;
    margin-bottom: 10px;
}
.file-item a {
    color: #00d4ff;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}
.file-item a:hover {
    color: #53f0ce;
    text-decoration: underline;
}
.file-size {
    color: #888;
    font-size: 14px;
    margin-top: 5px;
}
.footer {
    text-align: center;
    color: #555;
    margin-top: 40px;
    font-size: 12px;
}
</style>
</head>
<body>
<h1>Vita File Server</h1>
<div class="file-list">

<div class="file-item">
<a href="https://raw.githubusercontent.com/CFrameFinder/vita-filehost/master/sm64.us.60fps.puppycam.vpk">sm64.us.60fps.puppycam.vpk</a>
<div class="file-size">6.6 MB - Super Mario 64 (60fps + Puppycam)</div>
</div>

</div>
<div class="footer">PS Vita File Host</div>
</body>
</html>
